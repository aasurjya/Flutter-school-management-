name: school_management
description: Multi-tenant School Management SaaS Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Backend & Auth
  supabase_flutter: ^2.3.2

  # Local Database (Offline-first)
  isar: ^3.1.0+1

  # Routing
  go_router: ^13.1.0

  # Charts & Visualization
  fl_chart: ^0.66.0

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.12.0

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # HTTP Client
  http: ^1.2.0

  # Cryptography
  crypto: ^3.0.3

  # Utils
  intl: ^0.20.2
  path_provider: ^2.1.2
  url_launcher: ^6.2.3
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  razorpay_flutter: ^1.3.7

  # Calendar
  table_calendar: ^3.0.9

  # Image Picker (profile photo upload)
  image_picker: ^1.0.7

  # UI Helpers
  google_fonts: ^6.1.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.0
  
  freezed_annotation: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  integration_test:
    sdk: flutter
  mocktail: ^1.0.1

  # Code Generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  freezed: ^2.4.6

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
